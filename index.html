<script>
let data = null;

fetch('./data.json')
  .then(res => res.json())
  .then(json => {
    data = json;
  });

function predict(){

const time =
parseFloat(document.getElementById("time").value);

if(isNaN(time)){
    alert("タイムを入力してください");
    return;
}

const event =
document.getElementById("event").value;

const eventData =
data[event];

let totalRank = 0;

for(const yearData of eventData){

    let rank = yearData.places.length + 1;

    for(let i=0;i<yearData.places.length;i++){
        if(time <= yearData.places[i]){
            rank = i + 1;
            break;
        }
    }

    totalRank += rank;
}

const avgRank =
(totalRank / eventData.length).toFixed(1);

let message="";

if(avgRank <= 3){
    message="表彰台クラス";
}
else if(avgRank <= 5){
    message="入賞クラス";
}
else{
    message="決勝進出クラス";
}

const nyushoLines = {
  "男子400mH":50.68,
  "男子400m":47.00,
  "男子1500m":229
};

const nyushoLine = nyushoLines[event];

const diff =
(time - nyushoLine).toFixed(2);

let challengeText="";

if(time <= nyushoLine){
    challengeText =
    `入賞ラインを ${Math.abs(diff)} 秒上回っています`;
}
else{
    challengeText =
    `入賞ラインまであと ${diff} 秒`;
}

document.getElementById("result").innerHTML = `
<h2>予想結果</h2>
<p>入力タイム：${time.toFixed(2)} 秒</p>
<p>平均予想順位：${avgRank} 位</p>
<p>${message}</p>
<p>${challengeText}</p>
`;

}
</script>
