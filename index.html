<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インターハイ順位予測器</title>

<style>
body{
    font-family:sans-serif;
    max-width:600px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:18px;
}

.result{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
}
</style>

</head>
<body>

<h1>インターハイ順位予測器</h1>

<p>男子400mHタイムを入力</p>

<input
id="time"
type="number"
step="0.01"
placeholder="例：51.20">

<button onclick="predict()">
順位予想
</button>

<div class="result" id="result">
タイムを入力してください
</div>

<script>

const data = [
{
year:2025,
places:[49.84,49.98,50.48,50.57,50.68]
},
{
year:2024,
places:[50.20,50.55,50.70,50.90,51.10]
},
{
year:2023,
places:[50.14,50.64,50.74,51.93,51.94]
}
];

function predict(){

const time =
parseFloat(
document.getElementById("time").value
);

if(isNaN(time)){
    alert("タイムを入力してください");
    return;
}

let totalRank = 0;

for(const yearData of data){

    let rank = yearData.places.length + 1;

    for(let i=0;i<yearData.places.length;i++){

        if(time <= yearData.places[i]){
            rank = i + 1;
            break;
        }
    }

    totalRank += rank;
}

const avgRank =
(totalRank / data.length)
.toFixed(1);

let message="";

if(avgRank <= 3){
    message="表彰台クラス";
}
else if(avgRank <= 5){
    message="入賞クラス";
}
else{
    message="決勝進出クラス";
}

document.getElementById("result").innerHTML = `
<h2>予想結果</h2>
<p>入力タイム：${time.toFixed(2)} 秒</p>
<p>平均予想順位：${avgRank} 位</p>
<p>${message}</p>
`;

}

</script>

</body>
</html>
