〈!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インターハイ順位予測器</title>

<style>
body{
    font-family:sans-serif;
    max-width:600px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:18px;
}

.result{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
}
</style>

</head>
<body>

<h1>インターハイ順位予測器</h1>

<p>男子400mHタイムを入力</p>

<select id="event">

<option>男子400mH</option>

<option>男子400m</option>

<option>男子1500m</option>

</select>

<input
id="time"
type="number"
step="0.01"
placeholder="例：51.20">

<button onclick="predict()">
順位予想
</button>

<div class="result" id="result">
タイムを入力してください
</div>

<script>

let data = null;

fetch('./data.json')
  .then(res => res.json())
  .then(json => {
    data = json;

    // ここで初期処理を動かす
    init();
  });

function init() {
  console.log("データ読み込み完了", data);

  // ここに今までの計算処理を書く
}

function predict(){

const time =
parseFloat(
document.getElementById("time").value
);

if(isNaN(time)){
    alert("タイムを入力してください");
    return;
}

let totalRank = 0;

const event =
document.getElementById("event").value;

const eventData =
data[event];

for(const yearData of eventData){

    let rank = yearData.places.length + 1;

    for(let i=0;i<yearData.places.length;i++){

        if(time <= yearData.places[i]){
            rank = i + 1;
            break;
        }
    }

    totalRank += rank;
}

const avgRank =
(totalRank / eventData.length)
.toFixed(1);

let message="";

if(avgRank <= 3){
    message="表彰台クラス";
}
else if(avgRank <= 5){
    message="入賞クラス";
}
else{
    message="決勝進出クラス";
}

const nyushoLines = {
  "男子400mH":50.68,
  "男子400m":47.00,
  "男子1500m":229
};

const nyushoLine = nyushoLines[event];

const diff =
(time - nyushoLine)
.toFixed(2);

let challengeText="";

if(time <= nyushoLine){
    challengeText =
    `入賞ラインを ${Math.abs(diff)} 秒上回っています`;
}
else{
    challengeText =
    `入賞ラインまであと ${diff} 秒`;
}

document.getElementById("result").innerHTML = `
<h2>予想結果</h2>
<p>入力タイム：${time.toFixed(2)} 秒</p>
<p>平均予想順位：${avgRank} 位</p>
<p>${message}</p>
<p>${challengeText}</p>
`;

}



</script>

</body>
</html>
