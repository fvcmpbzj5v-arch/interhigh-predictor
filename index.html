<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インターハイ順位予測器</title>

<style>
body{
    font-family:sans-serif;
    max-width:600px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:18px;
}

.result{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
}
</style>

</head>
<body>

<h1>インターハイ順位予測器</h1>

<p>男子400mHタイムを入力</p>

<select id="event">

<option>男子400mH</option>

<option>男子400m</option>

<option>男子1500m</option>

</select>

<input
id="time"
type="number"
step="0.01"
placeholder="例：51.20">

<button onclick="predict()">
順位予想
</button>

<div class="result" id="result">
タイムを入力してください
</div>

<script>

let data = null;

fetch('./data.json')
  .then(res => res.json())
  .then(json => {
    data = json;

    // ここで初期処理を動かす
    init();
  });

function init() {
  console.log("データ読み込み完了", data);

  // ここに今までの計算処理を書く
}

function predict(){

const time =
parseFloat(
document.getElementById("time").value
);

if(isNaN(time)){
    alert("タイムを入力してください");
    return;
}

let totalRank = 0;
let yearResults = "";

let nyushoCount = 0;
let finalCount = 0;

const event =
document.getElementById("event").value;

const eventData =
data[event];

for(const yearData of eventData){

    let rank = yearData.places.length + 1;

    for(let i=0;i<yearData.places.length;i++){
        if(time <= yearData.places[i]){
            rank = i + 1;
            break;
        }
    }

    totalRank += rank;

if(rank <= 8){
    finalCount++;
}

if(rank <= 5){
    nyushoCount++;
}

yearResults += `
<p>${yearData.year}年 → ${rank}位相当</p>
`;

}

const avgRank =
(totalRank / eventData.length)
.toFixed(1);

const nyushoRate =
Math.round(
(nyushoCount / eventData.length) * 100
);

const finalRate =
Math.round(
(finalCount / eventData.length) * 100
);

let message="";

if(avgRank <= 3){
    message="表彰台クラス";
}
else if(avgRank <= 5){
    message="入賞クラス";
}
else{
    message="決勝進出クラス";
}

const nyushoLines = {
  "男子400mH":50.68,
  "男子400m":47.00,
  "男子1500m":229
};

const podiumLines = {
  "男子400mH":50.48,
  "男子400m":46.50,
  "男子1500m":225
};

const winLines = {
  "男子400mH":49.84,
  "男子400m":46.00,
  "男子1500m":223
};

const nyushoLine = nyushoLines[event];

const podiumLine = podiumLines[event];
const winLine = winLines[event];

const podiumDiff =
(time - podiumLine).toFixed(2);

const winDiff =
(time - winLine).toFixed(2);

const diff =
(time - nyushoLine)
.toFixed(2);

let podiumText = "";
let winText = "";

if(time <= podiumLine){
    podiumText =
    `表彰台ラインを ${Math.abs(podiumDiff)} 秒上回っています`;
}
else{
    podiumText =
    `表彰台まであと ${podiumDiff} 秒`;
}

if(time <= winLine){
    winText =
    `優勝ラインを ${Math.abs(winDiff)} 秒上回っています`;
}
else{
    winText =
    `優勝まであと ${winDiff} 秒`;
}

document.getElementById("result").innerHTML = `
<h2>予想結果</h2>

<p>入力タイム：${time.toFixed(2)} 秒</p>

${yearResults}

<hr>

<p>平均予想順位：${avgRank} 位</p>
<p>入賞率：${nyushoRate}%</p>
<p>決勝進出率：${finalRate}%</p>
<p>${message}</p>
<p>${challengeText}</p>
<p>${podiumText}</p>
<p>${winText}</p>
`;

}



</script>

</body>
</html>
